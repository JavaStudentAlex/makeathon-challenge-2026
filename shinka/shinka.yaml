# Config for:
#   shinka_run --task-dir shinka --config-fname shinka.yaml \
#     --results_dir results/shinka_simple_ml --num_generations 100
#
# The evaluator owns held-out scoring data and labels. It first calls the
# candidate training entry point, then passes only an unlabeled feature input
# view to candidate inference.

max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 2
verbose: true

evo:
  task_sys_msg: |
    You are evolving shinka/initial.py for the osapiens Makeathon 2026
    deforestation challenge. The program must define run_experiment() for
    training and run_inference(model, prediction_data_dir) for inference.
    run_experiment() must train from data/makeathon-challenge/training and
    return whatever model object run_inference needs. The evaluator supplies
    prediction_data_dir only to run_inference, as an unlabeled feature input.
    run_inference must return a GeoJSON FeatureCollection, a GeoDataFrame, a
    path, or a dict containing a GeoJSON/path. The evaluator separately reads
    scoring labels, so useful changes should improve spatial precision/recall
    without breaking time_step/year properties.

    Use simple ML ideas from deep-research-report.md before reaching for deep
    models. Prioritize compact, robust code that can run locally in minutes.

    Shallow model ideas:
    - Start with cheap scikit-learn baselines over engineered patch or pixel
      features: LogisticRegression/SGDClassifier, RidgeClassifier wrapped in
      CalibratedClassifierCV, GaussianNB, LinearDiscriminantAnalysis,
      QuadraticDiscriminantAnalysis, DecisionTreeClassifier,
      RandomForestClassifier, ExtraTreesClassifier,
      HistGradientBoostingClassifier, AdaBoostClassifier, BaggingClassifier,
      and calibrated linear/RBF SVMs. Prefer probability outputs or calibrated
      decision margins so models can be blended consistently.
    - Train and blend boosted-tree families: XGBoost, LightGBM, CatBoost, and
      scikit-learn HistGradientBoosting. Keep depth/leaves/estimators small,
      use class_weight or sample_weight for imbalance where supported, and use
      n_jobs=1 plus early-stopping/max-iteration controls where available.
    - Add report-derived classical baselines before deep nets: McGregor-style
      harmonized z-score/EWMA disturbance probability, CUSUM or rolling-change
      scores, Gaussian/prototype distance models, additive logistic margins,
      tiny boosted-stump/rule-vote ensembles, and sensor-agreement scores.
    - Add SAR-specific statistical classifiers inspired by the report's
      stage-aware SAR analysis: QDA/LDA, random forests, and decision trees over
      VV drop, VV variability, orbit-separated signals, RFDI-like proxies when
      available, and timing features for early logging, burning/clearing, and
      regrowth-like false positives.
    - Compare high-bias interpretable models against flexible tree models:
      linear/logistic margins expose feature sign mistakes, Naive Bayes and
      prototype scores test distribution assumptions, and RF/ExtraTrees test
      nonlinear feature interactions without heavy tuning.
    - Average calibrated probabilities first; only add soft VotingClassifier,
      StackingClassifier, or a small logistic/meta-tree blender if there is a
      real training-only CV signal and no leakage from prediction/evaluation
      data.
    - Keep a fixed physics-inspired prior in the ensemble so candidates remain
      sensible when labels are weak or sparse.
    - Tune one global threshold through Shinka evaluator feedback or
      training-only CV, then consider separate high-recall and
      high-precision variants.
    - Try bagged shallow ensembles over bootstrap samples, feature subsets, and
      conservative/high-recall thresholds.
    - Try explicit weak-label noise handling: train high-confidence positives
      from consensus alerts, sample stable forest negatives far from alerts,
      down-weight single-source low-confidence labels, use
      imbalanced-learn under/over-sampling only inside the training split, and
      keep a held-out tile CV check before trusting a new sampler.
    - Use Optuna only for tiny bounded searches over thresholds, tree depth,
      learning rate, class weights, feature subsets, and ensemble weights.
      Avoid broad hyperparameter sweeps that threaten the 30 minute training
      budget.
    - Use SHAP or model feature importances only as diagnostics to catch
      confounders and leakage; do not spend evaluator time on explanation
      plots or slow per-pixel attribution.

    Architecture ideas:
    - Prefer real model/pipeline architecture changes over only polishing
      thresholds. Threshold tuning is allowed, but useful candidates should
      usually change feature construction, estimator family, ensemble topology,
      sampling strategy, temporal aggregation, spatial cleanup, or calibration.
    - Build two-stage cascades: a high-recall candidate detector from cheap
      physics/statistical signals, followed by a stricter learned classifier or
      confuser-rejection model for water, crop, urban, bare-soil, cloud/shadow,
      and seasonal-change false positives.
    - Try per-modality experts with an explicit blender: optical-change expert,
      SAR-structure expert, AlphaEarth semantic-shift expert, weak-label/timing
      expert, and negative-context expert. Blend through calibrated weighted
      averaging, soft voting, a tiny logistic blender, or a shallow tree only
      when trained on training-only folds.
    - Try temporal architectures that are still simple ML: pairwise year/month
      classifiers followed by first-hit logic, rolling-window anomaly models,
      EWMA/CUSUM sequential scores, hysteresis thresholds, and per-year
      probability smoothing. Preserve meaningful time_step/year outputs.
    - Try spatial architectures beyond one-pixel classification: patch-level
      pooled features, connected-component reranking by area/shape/support,
      local-consensus features used as model inputs, and component-level
      precision filters before GeoJSON polygonization.
    - Make the trained return object carry a clear architecture: feature names,
      preprocessing/scalers, fitted estimators, calibrators, ensemble weights,
      threshold or per-stage thresholds, and any spatial/temporal postprocessing
      parameters needed by run_inference.
    - Use tile-level train/CV splits to compare architectures, not random
      pixel-only validation. Random pixels can leak spatial context and make a
      threshold-only change look better than it is.

    Library guidance:
    - The Shinka execution environment has the simple-ML libraries available:
      scikit-learn, xgboost, lightgbm, catboost, imbalanced-learn, optuna,
      scipy, scikit-image, and shap. Candidates may import these inside the
      evolved code when they are useful.
    - Do not add decorative top-level imports just to prove availability.
      Prefer local imports inside the model branch that uses a package,
      especially for optional/heavier dependencies such as xgboost, lightgbm,
      catboost, optuna, and shap.
    - These packages are already listed in the pyproject.toml experiments
      dependency group, so do not add new dependencies for ordinary simple-ML
      candidates.
    - Do not introduce GPU/deep-learning libraries for this Shinka run unless
      the simple ML search clearly plateaus; gpu-experiments is intentionally
      separate from the default simple-ML path.

    Feature ideas:
    - Forest-in-2020 eligibility gate. Deforestation should be impossible where
      baseline forest evidence is absent.
    - Optical drops and anomalies: NDVI, NBR, NDMI, EVI, NDRE, BSI, NDWI,
      month-to-month deltas, 3/6/12 month rolling drops, and standardized
      z-score anomalies against local history.
    - SAR structure loss: Sentinel-1 VV drop, VV coefficient-of-variation
      change, and orbit-separated ascending/descending features.
    - AlphaEarth semantic shift: yearly 64-dimensional embedding distance or
      compact PCA/norm summaries as land-cover-transition evidence.
    - Weak-label consensus: combine RADD, GLAD-L, and GLAD-S2 agreement for
      candidate sampling and timing, but do not treat alerts as area truth by
      themselves.
    - Negative context features: water/flooding, crop, urban, bare soil,
      cloud/shadow, and seasonal-drop indicators to suppress false positives.
    - Spatial cleanup: local consensus filters, minimum-patch support, and
      small-polygon filtering, while preserving valid EPSG:4326 GeoJSON output.

    Hard constraints:
    - Keep run_experiment() deterministic and bounded. It must not accept or
      read prediction/evaluation data.
    - Keep run_inference(model, prediction_data_dir) as inference-only code:
      apply the already-trained model to feature rasters and return predictions.
    - Keep the full trained model build under 30 minutes, whether the candidate
      trains one estimator or an ensemble. Preserve
      TRAINING_TIMEOUT_SECONDS = 30 * 60, prefer model-native max_iter,
      n_estimators, early-stopping, and n_jobs controls.
    - Keep the evaluator candidate execution window at 40 minutes. Preserve
      DEFAULT_RUN_TIMEOUT_SECONDS = 40 * 60 and do not remove the evaluator
      run_timeout_seconds guard.
    - Train only from data/makeathon-challenge/training features and labels.
    - Read only feature rasters from the provided prediction_data_dir inside
      run_inference; never train from that directory.
    - Do not silently reinterpret raw labels without explicit decoding logic.
    - Keep edits inside # EVOLVE-BLOCK-START / # EVOLVE-BLOCK-END regions and
      preserve those markers for future generations.
    - Preserve the evaluator contract and return valid GeoJSON.
  num_generations: 100
  max_api_costs: 100
  patch_types:
    - diff
    - full
    - cross
  patch_type_probs:
    - 0.6
    - 0.3
    - 0.1
  max_patch_resamples: 2
  max_patch_attempts: 1
  max_novelty_attempts: 1
  # Keep proposal concurrency matched to evaluator slots on CPU-only local runs.
  # Evaluations are the bottleneck for this raster-heavy task, so avoid building
  # a proposal backlog ahead of completed scoring feedback.
  enable_controlled_oversubscription: false
  proposal_target_mode: fixed
  proposal_buffer_max: 0
  proposal_target_hard_cap: 2
  meta_rec_interval: 5
  # Source the repo .env before running so LOCAL_OPENAI_API_KEY is available
  # to the local OpenAI-compatible proxy used for proposal models.
  llm_models:
    - local/claude-opus-4-7@http://localhost:8318/v1?api_key_env=LOCAL_OPENAI_API_KEY
    - local/claude-sonnet-4-6@http://localhost:8318/v1?api_key_env=LOCAL_OPENAI_API_KEY
    - local/gpt-5.5@http://localhost:8318/v1?api_key_env=LOCAL_OPENAI_API_KEY
    - local/gpt-5.4@http://localhost:8318/v1?api_key_env=LOCAL_OPENAI_API_KEY
    - local/gpt-5.4-mini@http://localhost:8318/v1?api_key_env=LOCAL_OPENAI_API_KEY
    - local/gemini-3-flash-preview@http://localhost:8318/v1?api_key_env=LOCAL_OPENAI_API_KEY
  llm_dynamic_selection: ucb
  llm_kwargs:
    temperatures:
      - 0.0
      - 0.5
      - 1.0
    max_tokens: 16384
  # Direct Ollama embeddings server exposed via OpenAI-compatible /v1.
  embedding_model: local/qwen3-embedding:8b@http://localhost:11434/v1
  code_embed_sim_threshold: 0.995
  use_text_feedback: true

db:
  num_islands: 2
  archive_size: 24
  elite_selection_ratio: 0.25
  num_archive_inspirations: 3
  num_top_k_inspirations: 2
  migration_interval: 8
  migration_rate: 0.1
  island_elitism: true
  parent_selection_strategy: weighted
  exploitation_ratio: 0.25

job:
  # The evaluator enforces 2400 seconds for candidate execution; this gives it
  # a short grace window to write failure metrics before the job wrapper kills it.
  time: "00:41:00"
  numeric_threads_per_job: 1
  extra_cmd_args:
    run_timeout_seconds: 2400
